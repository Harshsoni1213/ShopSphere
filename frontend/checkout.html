<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - ShopSphere</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="cart.css">
</head>

<body>

<!-- 🔥 Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">ShopSphere</a>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4">💳 Checkout</h2>

    <div class="row">

        <!-- 🧾 Billing Form -->
        <div class="col-lg-7">
            <div class="checkout-form">

                <h4>Billing Details</h4>

                <input type="text" id="name" placeholder="Full Name" class="form-control mb-3">
                <input type="text" id="phone" placeholder="Phone Number" class="form-control mb-3">
                <input type="email" id="email" placeholder="Email" class="form-control mb-3">
                <textarea id="address" placeholder="Full Address" class="form-control mb-3"></textarea>

                <select id="payment" class="form-control mb-3">
                    <option value="">Select Payment Method</option>
                    <option>Cash on Delivery</option>
                    <option>UPI</option>
                    <option>Card</option>
                </select>
                <!-- 💳 Payment Section -->
<div class="payment-box mt-4">

    <h4>Select Payment Method</h4>

    <div class="payment-options">

        <div class="payment-card" onclick="selectPayment('COD', this)">
            <h5>💵 Cash on Delivery</h5>
            <p>Pay when you receive</p>
        </div>

        <div class="payment-card" onclick="selectPayment('UPI', this)">
            <h5>📱 UPI</h5>
            <p>Google Pay / PhonePe</p>
        </div>

        <div class="payment-card" onclick="selectPayment('CARD', this)">
            <h5>💳 Debit / Credit Card</h5>
            <p>Visa / MasterCard</p>
        </div>

    </div>

    <!-- Card Form -->
    <div id="card-form" style="display:none;">
        <input type="text" placeholder="Card Number" class="form-control mb-2">
        <input type="text" placeholder="Expiry (MM/YY)" class="form-control mb-2">
        <input type="text" placeholder="CVV" class="form-control mb-2">
    </div>

</div>

                <button class="btn btn-success w-100" onclick="placeOrder()">
                    Place Order
                </button>

            </div>
        </div>

        <!-- 💰 Order Summary -->
        <div class="col-lg-5">
            <div class="cart-summary">
                <h4>Order Summary</h4>
                <hr>

                <div id="order-items"></div>

                <hr>
                <h5>Total: ₹<span id="total-price">0</span></h5>
            </div>
        </div>

    </div>

</div>

<script src="checkout.js"></script>

</body>
</html>
