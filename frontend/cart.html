<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart - ShopSphere</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="cart.css">
</head>

<body>

<!-- 🔥 Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">ShopSphere</a>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4">🛒 Your Cart</h2>

    <div class="row">
        
        <!-- 🧾 Cart Items -->
        <div class="col-lg-8" id="cart-items"></div>

        <!-- 💰 Summary -->
        <div class="col-lg-4">
            <div class="cart-summary">
                <h4>Price Details</h4>
                <hr>
                <p>Total Items: <span id="total-items">0</span></p>
                <h5>Total: ₹<span id="total-price">0</span></h5>
                <button onclick="window.location.href='checkout.html'" class="btn btn-success w-100 mt-3">
    Checkout
</button>
            </div>
        </div>

    </div>

</div>

<script src="cart.js"></script>

</body>
</html>
