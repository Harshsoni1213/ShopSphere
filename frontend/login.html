<!DOCTYPE html>
<html>
<head>
    <title>Login - ShopSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="col-md-4 mx-auto bg-white p-4 rounded shadow">
        <h3 class="text-center mb-3">Login</h3>

        <input type="email" id="login-email" placeholder="Email" class="form-control mb-3">
        <input type="password" id="login-password" placeholder="Password" class="form-control mb-3">

        <button class="btn btn-dark w-100" onclick="login()">Login</button>

        <p class="mt-3 text-center">
            Don't have account? <a href="signup.html">Signup</a>
        </p>
    </div>

</div>

<script src="auth.js"></script>

</body>
</html>
