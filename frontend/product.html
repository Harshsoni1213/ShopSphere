<!DOCTYPE html>
<html>
<head>
    <title>Product - ShopSphere</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">ShopSphere</a>
    </div>
</nav>

<div class="container mt-5">

    <!-- ⬅ Back Button -->
    <button class="btn btn-outline-dark mb-3" onclick="goBack()">
        ⬅ Back to Shop
    </button>

    <div class="row">

        <!-- 🖼️ Image -->
        <div class="col-md-6">
            <img id="product-image" class="img-fluid rounded shadow">
        </div>

        <!-- 📦 Details -->
        <div class="col-md-6">
            <h2 id="product-name"></h2>
            <h4 class="text-success" id="product-price"></h4>

            <button class="btn btn-success mt-3 w-100" onclick="addToCartDetail()">
                Add to Cart 🛒
            </button>
        </div>

    </div>

</div>

<!-- 🔔 Toast -->
<div id="toast" class="toast-box"></div>

<!-- JS -->
<script src="product.js"></script>

</body>
</html>
