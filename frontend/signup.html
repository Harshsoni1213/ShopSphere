<!DOCTYPE html>
<html>
<head>
    <title>Signup - ShopSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="col-md-4 mx-auto bg-white p-4 rounded shadow">
        <h3 class="text-center mb-3">Signup</h3>

        <input type="text" id="name" placeholder="Name" class="form-control mb-3">
        <input type="email" id="email" placeholder="Email" class="form-control mb-3">
        <input type="password" id="password" placeholder="Password" class="form-control mb-3">

        <button class="btn btn-success w-100" onclick="signup()">Signup</button>

        <p class="mt-3 text-center">
            Already have account? <a href="login.html">Login</a>
        </p>
    </div>

</div>

<script src="auth.js"></script>
</body>
</html>
